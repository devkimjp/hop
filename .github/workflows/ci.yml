name: HOP CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hop-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_VERSION: "24"

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euo pipefail

          fuse_package="libfuse2"
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            fuse_package="libfuse2t64"
          fi

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            "$fuse_package" \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: unit-tests-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            unit-tests-pnpm-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: unit-tests-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            unit-tests-cargo-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test
