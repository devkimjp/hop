name: HOP Desktop Release

on:
  workflow_dispatch:
    inputs:
      build_ref:
        description: Git ref to build, for example main or v0.1.0. Empty uses release_tag for releases, otherwise the selected workflow ref.
        required: false
        default: ""
        type: string
      macos_arm64:
        description: Build macOS arm64 on macos-15
        required: false
        default: true
        type: boolean
      macos_x64:
        description: Build macOS x64 on macos-15-intel
        required: false
        default: true
        type: boolean
      windows_x64:
        description: Build Windows x64
        required: false
        default: false
        type: boolean
      linux_x64:
        description: Build Linux x64
        required: false
        default: false
        type: boolean
      create_release:
        description: Create or update a GitHub draft release
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag. Required when create_release is true, for example v0.1.0.
        required: false
        default: ""
        type: string
      release_draft:
        description: Keep GitHub release as draft
        required: false
        default: true
        type: boolean
      prerelease:
        description: Mark GitHub release as prerelease
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - ".github/workflows/hop-desktop.yml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "assets/fonts/**"
      - "assets/logo/**"
      - "docs/architecture/**"
      - "docs/operations/**"
      - "docs/specs/**"
      - "apps/desktop/**"
      - "apps/studio-host/**"
      - "third_party/rhwp"
      - ".gitmodules"

permissions:
  contents: read

concurrency:
  group: hop-desktop-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_VERSION: "24"

jobs:
  prepare:
    name: Prepare desktop matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_builds: ${{ steps.matrix.outputs.has_builds }}
      build_ref: ${{ steps.ref.outputs.build_ref }}
      create_release: ${{ steps.release.outputs.create_release }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_name: ${{ steps.release.outputs.release_name }}
      release_draft: ${{ steps.release.outputs.release_draft }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true

      - name: Resolve build ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail

          build_ref=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            build_ref="${{ inputs.build_ref }}"
            if [[ -z "$build_ref" && "${{ inputs.create_release }}" == "true" ]]; then
              build_ref="${{ inputs.release_tag }}"
            fi
          fi

          if [[ -z "$build_ref" ]]; then
            build_ref="${{ github.sha }}"
          fi

          if ! git rev-parse --verify --quiet "${build_ref}^{commit}" >/dev/null; then
            echo "::error::Build ref '${build_ref}' does not exist. Use an existing branch, tag, or commit SHA."
            exit 1
          fi

          echo "build_ref=$build_ref" >> "$GITHUB_OUTPUT"

      - name: Select platforms
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          matrix='{"include":[]}'

          add_platform() {
            matrix="$(jq -c \
              --arg name "$1" \
              --arg os "$2" \
              --arg target "$3" \
              --arg args "$4" \
              '.include += [{name:$name, os:$os, target:$target, args:$args}]' \
              <<< "$matrix")"
          }

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            add_platform "linux-x64" "ubuntu-24.04" "x86_64-unknown-linux-gnu" ""
          else
            [[ "${{ inputs.macos_arm64 }}" == "true" ]] && add_platform "macos-arm64" "macos-15" "aarch64-apple-darwin" "--target aarch64-apple-darwin"
            [[ "${{ inputs.macos_x64 }}" == "true" ]] && add_platform "macos-x64" "macos-15-intel" "x86_64-apple-darwin" "--target x86_64-apple-darwin"
            [[ "${{ inputs.windows_x64 }}" == "true" ]] && add_platform "windows-x64" "windows-2025" "x86_64-pc-windows-msvc" ""
            [[ "${{ inputs.linux_x64 }}" == "true" ]] && add_platform "linux-x64" "ubuntu-24.04" "x86_64-unknown-linux-gnu" ""
          fi

          count="$(jq '.include | length' <<< "$matrix")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [[ "$count" == "0" ]]; then
            echo "has_builds=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_builds=true" >> "$GITHUB_OUTPUT"
            echo "$matrix"
          fi

      - name: Resolve release settings
        id: release
        shell: bash
        run: |
          set -euo pipefail

          create_release="false"
          release_tag=""
          release_draft="true"
          prerelease="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.create_release }}" == "true" ]]; then
            create_release="true"
            release_tag="${{ inputs.release_tag }}"
            release_draft="${{ inputs.release_draft }}"
            prerelease="${{ inputs.prerelease }}"

            if [[ -z "$release_tag" ]]; then
              echo "::error::release_tag is required when create_release is true."
              exit 1
            fi

            if [[ "${{ inputs.macos_arm64 }}" != "true" || "${{ inputs.macos_x64 }}" != "true" ]]; then
              echo "::error::Release builds must include both macOS arm64 and macOS x64 because the README and website link directly to both signed/notarized .dmg assets."
              exit 1
            fi
          fi

          if [[ "$create_release" == "true" ]]; then
            if [[ ! "$release_tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Desktop release tags must use vMAJOR.MINOR.PATCH, for example v0.1.0."
              exit 1
            fi

            if [[ "${{ steps.ref.outputs.build_ref }}" != "$release_tag" ]]; then
              echo "::error::For releases, build_ref must match release_tag so the release is built from the selected tag."
              exit 1
            fi

            release_name="HOP $release_tag"
          else
            release_name=""
          fi

          echo "create_release=$create_release" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "release_draft=$release_draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.has_builds == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
      HAS_APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8_BASE64 != '' }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY != '' }}
      HAS_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER != '' }}
      HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
      HAS_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD != '' }}
      HAS_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          fetch-depth: 0
          submodules: true

      - name: Enable long paths on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --system core.longpaths true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          fuse_package="libfuse2"
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            fuse_package="libfuse2t64"
          fi

          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            "$fuse_package" \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            rpm \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ matrix.name }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ matrix.name }}-pnpm-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.name }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.name }}-cargo-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Validate macOS release signing secrets
        id: macos-signing
        if: runner.os == 'macOS' && needs.prepare.outputs.create_release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$HAS_APPLE_CERTIFICATE" != "true" ]]; then
            echo "::error::APPLE_CERTIFICATE is required for macOS release builds."
            exit 1
          fi

          if [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "::error::APPLE_CERTIFICATE_PASSWORD is required for macOS release builds."
            exit 1
          fi

          has_api_notary="false"
          if [[ "$HAS_APPLE_API_KEY" == "true" && "$HAS_APPLE_API_KEY_P8" == "true" && "$HAS_APPLE_API_ISSUER" == "true" ]]; then
            has_api_notary="true"
          fi

          has_apple_id_notary="false"
          if [[ "$HAS_APPLE_ID" == "true" && "$HAS_APPLE_PASSWORD" == "true" && "$HAS_APPLE_TEAM_ID" == "true" ]]; then
            has_apple_id_notary="true"
          fi

          if [[ "$has_api_notary" != "true" && "$has_apple_id_notary" != "true" ]]; then
            echo "::error::macOS release builds require notarization credentials. Set APPLE_API_KEY + APPLE_API_ISSUER + APPLE_API_KEY_P8_BASE64, or APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID."
            exit 1
          fi

          if [[ "$has_api_notary" == "true" ]]; then
            echo "notary_auth=api-key" >> "$GITHUB_OUTPUT"
          else
            echo "notary_auth=apple-id" >> "$GITHUB_OUTPUT"
          fi
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Export Tauri build secrets
        shell: bash
        env:
          NOTARY_AUTH: ${{ steps.macos-signing.outputs.notary_auth }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail

          export_env_if_set() {
            local name="$1"
            local value="${!name:-}"
            local delimiter

            if [[ -z "$value" ]]; then
              return 0
            fi

            delimiter="EOF_$(node -e "console.log(require('node:crypto').randomUUID().replaceAll('-', '').toUpperCase())")"
            {
              echo "$name<<$delimiter"
              printf '%s\n' "$value"
              echo "$delimiter"
            } >> "$GITHUB_ENV"
          }

          if [[ "${NOTARY_AUTH:-}" == "api-key" ]]; then
            export_env_if_set APPLE_API_KEY
            export_env_if_set APPLE_API_ISSUER
          elif [[ "${NOTARY_AUTH:-}" == "apple-id" ]]; then
            export_env_if_set APPLE_ID
            export_env_if_set APPLE_PASSWORD
            export_env_if_set APPLE_TEAM_ID
          fi

          export_env_if_set TAURI_SIGNING_PRIVATE_KEY
          export_env_if_set TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          export_env_if_set AZURE_CLIENT_ID
          export_env_if_set AZURE_CLIENT_SECRET
          export_env_if_set AZURE_TENANT_ID

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERTIFICATE == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD is required when APPLE_CERTIFICATE is set.}"

          cert_path="$RUNNER_TEMP/apple-cert.p12"
          keychain_path="$RUNNER_TEMP/hop-signing.keychain-db"
          keychain_password="${KEYCHAIN_PASSWORD:-$(uuidgen)}"

          if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$cert_path" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$cert_path"
          fi
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          if [[ -n "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          else
            identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application|Apple Distribution|Apple Development/ { print $2; exit }')"
            if [[ -n "$identity" ]]; then
              echo "APPLE_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
            fi
          fi

      - name: Prepare Apple notarization API key
        if: runner.os == 'macOS' && steps.macos-signing.outputs.notary_auth == 'api-key'
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          : "${APPLE_API_KEY:?APPLE_API_KEY is required when APPLE_API_KEY_P8_BASE64 is set.}"
          key_dir="$RUNNER_TEMP/apple-api-key"
          mkdir -p "$key_dir"
          key_path="$key_dir/AuthKey_${APPLE_API_KEY}.p8"
          if ! printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$key_path" 2>/dev/null; then
            printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$key_path"
          fi
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build Tauri bundle
        id: tauri
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      - name: Collect Tauri artifact paths
        id: tauri-artifacts
        shell: bash
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          set -euo pipefail

          artifact_list="$RUNNER_TEMP/tauri-artifacts-${{ matrix.name }}.txt"
          node -e "const paths = JSON.parse(process.env.ARTIFACT_PATHS || '[]'); if (!Array.isArray(paths) || paths.length === 0) process.exit(1); for (const artifactPath of paths) console.log(artifactPath);" > "$artifact_list"

          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          cat "$artifact_list" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v7
        with:
          name: hop-desktop-${{ matrix.name }}-bundle
          path: ${{ steps.tauri-artifacts.outputs.paths }}
          if-no-files-found: error

  release:
    name: Create desktop release
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          find artifacts -type f | sort
          if ! find artifacts -type f | grep -q .; then
            echo "No desktop artifacts were downloaded."
            exit 1
          fi

          rm -rf release-assets
          mkdir -p release-assets

          release_asset_count=0

          copy_release_asset() {
            local platform="$1"
            local extension="$2"
            local output_name="$3"

            local matches
            local candidate
            local count

            matches="$(find artifacts \
              -type f \
              -path "*/hop-desktop-${platform}-*" \
              -name "*.${extension}" \
              ! -name "*.sig" \
              ! -name "*.blockmap" \
              | sort)"
            candidate="$(printf '%s\n' "$matches" | sed '/^[[:space:]]*$/d' | head -n 1)"
            count="$(printf '%s\n' "$matches" | sed '/^[[:space:]]*$/d' | wc -l | tr -d ' ')"

            if [[ -z "$candidate" ]]; then
              return 0
            fi

            if [[ "$count" -gt 1 ]]; then
              echo "::warning::Multiple ${platform} .${extension} assets found. Using ${candidate}."
              printf '%s\n' "$matches" | sed '/^[[:space:]]*$/d; s/^/  /'
            fi

            cp "$candidate" "release-assets/${output_name}"
            release_asset_count=$((release_asset_count + 1))
          }

          copy_release_asset "macos-arm64" "dmg" "HOP-macos-arm64.dmg"
          copy_release_asset "macos-x64" "dmg" "HOP-macos-x64.dmg"
          copy_release_asset "windows-x64" "msi" "HOP-windows-x64.msi"
          copy_release_asset "linux-x64" "AppImage" "HOP-linux-x64.AppImage"

          copy_release_asset "windows-x64" "exe" "HOP-windows-x64.exe"
          copy_release_asset "linux-x64" "deb" "HOP-linux-x64.deb"
          copy_release_asset "linux-x64" "rpm" "HOP-linux-x64.rpm"

          if [[ ! -f "release-assets/HOP-macos-arm64.dmg" || ! -f "release-assets/HOP-macos-x64.dmg" ]]; then
            echo "::error::macOS releases must include both HOP-macos-arm64.dmg and HOP-macos-x64.dmg."
            exit 1
          fi

          if [[ "$release_asset_count" -eq 0 ]]; then
            echo "::error::No supported release assets were found. Expected at least one macOS .dmg, Windows .msi/.exe, or Linux AppImage/.deb/.rpm artifact."
            exit 1
          fi

          (
            cd release-assets
            find . -type f -print0 | sort -z | xargs -0 shasum -a 256
          ) > release-assets/SHA256SUMS.txt

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          find release-assets -type f | sort >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          RELEASE_DRAFT: ${{ needs.prepare.outputs.release_draft }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f | sort)

          create_flags=(
            --title "$RELEASE_NAME"
            --notes "Desktop installers for HOP. Release assets use stable names for direct download links."
          )

          if [[ "$RELEASE_DRAFT" == "true" ]]; then
            create_flags+=(--draft)
          fi

          if [[ "$PRERELEASE" == "true" ]]; then
            create_flags+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_NAME" \
              --draft="$RELEASE_DRAFT" \
              --prerelease="$PRERELEASE"
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" "${create_flags[@]}" --generate-notes
          fi
